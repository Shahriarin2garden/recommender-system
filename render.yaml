services:
  - type: web
    name: recommender-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # Set manually in Render dashboard (Neon connection string)
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: ENVIRONMENT
        value: production
      - key: REDIS_URL
        value: ""            # Empty = Redis disabled, falls back gracefully
      - key: FRONTEND_URL
        sync: false          # Set to your Vercel URL after deploy
    healthCheckPath: /health
