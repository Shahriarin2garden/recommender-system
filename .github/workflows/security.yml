name: Security Audit

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sunday at midnight

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
    
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies and pip-audit
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
        
    - name: Run pip-audit on backend
      run: pip-audit -r backend/requirements.txt
      
  audit-ml:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
    
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies and pip-audit
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit
        if [ -f ml/requirements.txt ]; then pip install -r ml/requirements.txt; fi
        
    - name: Run pip-audit on ml components
      run: pip-audit -r ml/requirements.txt

  npm-audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
    
    - name: Setup Node.js
      uses: actions/setup-node@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        node-version: '18'
        
    - name: Run npm audit
      working-directory: ./frontend
      # Warns on high/critical, but doesn't fail the build for moderate dependencies.
      run: npm audit --audit-level=high
